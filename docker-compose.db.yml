services:
    postgres:
        image: postgres:16-alpine
        container_name: cafe-postgres-db
        restart: always
        environment:
            POSTGRES_USER: cafe_admin
            POSTGRES_PASSWORD: cafe_secure_pass
            POSTGRES_DB: cafe_db
        ports:
            - "21593:5432"
        volumes:
            - postgres_data_dev:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U cafe_admin -d cafe_db"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    postgres_data_dev:
        driver: local
