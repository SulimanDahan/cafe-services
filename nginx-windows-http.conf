worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    
    keepalive_timeout  65;
    client_max_body_size 50M; # السماح برفع الصور

    # خادم HTTP (المنفذ 80)
    # وظيفته استقبال الزيارات وتمريرها مباشرة بدون أي تحويل لـ HTTPS
    server {
        listen       80;
        server_name  192.168.0.153;

        # إزالة أي ترويسة HSTS مسجلة مسبقاً في المتصفح لإجباره على نسيان الـ HTTPS
        add_header Strict-Transport-Security "max-age=0" always;
        proxy_hide_header Strict-Transport-Security;

        # إزالة أي سياسة ترقية للـ HTTPS
        proxy_hide_header Content-Security-Policy;

        # 1. إعدادات الإشعارات المباشرة (SSE) - لمنع التقطيع
        location /api/notifications/stream {
            proxy_pass http://127.0.0.1:3000/api/notifications/stream;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            
            # إغلاق الـ Buffering هنا هو السر لمرور الإشعارات فوراً بدون حجزها
            proxy_cache off;
            proxy_buffering off;
            proxy_read_timeout 24h;
        }

        # 2. إعدادات باقي أجزاء التطبيق
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # إرسال بيانات الاتصال للتطبيق وتأكيد أنه HTTP
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # السطر التالي يخبر التطبيق بأنه يعمل على بيئة HTTP وليست HTTPS
            proxy_set_header X-Forwarded-Proto http;
        }
    }

    # خادم وهمي لإنهاء الـ HTTPS (الخداع العكسي)
    # يستقبل الطلبات التي حاولت المتصفحات ترقيتها ويأمرها بمسح ذاكرة الـ HTTPS ثم يعيدها للـ HTTP
    server {
        listen       443 ssl;
        server_name  192.168.0.153 localhost _;

        # مسار الشهادات القديمة (يجب أن تكون موجودة في مجلد conf لكي يكتمل الاتصال ويستلم المتصفح الأمر)
        ssl_certificate      cert.pem;
        ssl_certificate_key  key.pem;

        # السطر السحري الذي يأمر المتصفح بمسح قاعدة الـ HTTPS فوراً
        add_header Strict-Transport-Security "max-age=0" always;

        # إرجاع العميل فوراً إلى نسخة الـ HTTP بدون إكمال الطلب
        return 301 http://$host$request_uri;
    }
}
