worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    
    keepalive_timeout  65;
    client_max_body_size 50M; # السماح برفع الصور

    # 1. خادم HTTP (المنفذ 80)
    # وظيفته الوحيدة استقبال الزيارات العادية وتحويلها فوراً إلى اتصال آمن (HTTPS)
    server {
        listen       80;
        server_name  localhost;
        return 301 https://$host$request_uri;
    }

    # 2. خادم HTTPS (المنفذ 443 الآمن)
    server {
        listen       443 ssl;
        server_name  localhost;

        # ملفات شهادة الـ SSL التي ستقوم بإنشائها وتضعها في مجلد conf
        ssl_certificate      cert.pem;
        ssl_certificate_key  key.pem;

        # إعدادات لضمان قبول الشهادات الذاتية وتسريع الاتصال
        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        # 1. إعدادات الإشعارات المباشرة (SSE) - لمنع التقطيع
        location /api/notifications/stream {
            proxy_pass http://127.0.0.1:3000/api/notifications/stream;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            
            # إغلاق الـ Buffering هنا هو السر لمرور الإشعارات فوراً بدون حجزها
            proxy_cache off;
            proxy_buffering off;
            proxy_read_timeout 24h;
        }

        # 2. إعدادات باقي أجزاء التطبيق
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # إرسال بيانات الاتصال المشفرة للتطبيق
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
