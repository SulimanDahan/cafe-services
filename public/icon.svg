<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e1017"/>
      <stop offset="100%" stop-color="#07080a"/>
    </radialGradient>
    
    <!-- Neon Accent Gradients -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/> <!-- Amber -->
      <stop offset="50%" stop-color="#f43f5e"/> <!-- Rose -->
      <stop offset="100%" stop-color="#38bdf8"/> <!-- Sky -->
    </linearGradient>

    <linearGradient id="steamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Subtle inner border glow -->
  <rect x="10" y="10" width="492" height="492" rx="118" fill="none" stroke="url(#neonGrad)" stroke-width="2" stroke-opacity="0.15"/>

  <!-- Icon Art (Glowing Coffee Cup) -->
  <g transform="translate(16, 20)" filter="url(#neonGlow)">
    <!-- Steam waves -->
    <path d="M190,150 C200,110 180,80 200,40" fill="none" stroke="url(#steamGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M240,150 C250,100 230,70 250,30" fill="none" stroke="url(#steamGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M290,150 C300,110 280,80 300,40" fill="none" stroke="url(#steamGrad)" stroke-width="8" stroke-linecap="round"/>

    <!-- Cup Body -->
    <path d="M140,180 L340,180 C340,180 330,310 240,310 C150,310 140,180 140,180 Z" fill="#0c0d10" stroke="url(#neonGrad)" stroke-width="14" stroke-linejoin="round"/>
    
    <!-- Cup Handle -->
    <path d="M338,205 C378,205 388,265 338,265" fill="none" stroke="url(#neonGrad)" stroke-width="14" stroke-linecap="round"/>

    <!-- Saucer plate -->
    <path d="M110,340 L370,340 C395,340 395,360 370,360 L110,360 C85,360 85,340 110,340 Z" fill="#0a0b0d" stroke="url(#neonGrad)" stroke-width="12" stroke-linejoin="round"/>
  </g>
</svg>
